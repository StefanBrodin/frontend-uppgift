<!DOCTYPE html> 
<html lang="sv-SE">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lägg till grupp - Evergreen Music</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/index.css">
    <link rel="stylesheet" href="assets/css/add-group.css">
    <script type="module" src="assets/js/add-group.js"></script>
</head>
<body>

    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo">Evergreen Music</a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Musikgrupper</a></li>
                    <li><a href="add-group.html">Lägg till grupp</a></li>
                    <li><a href="about.html">Om sidan</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <form id="add-group-form">
            <div class="content-wrapper">
                <h1>Lägg till en ny musikgrupp</h1>

                <section class="form-container">
                    <div class="form-group">
                        <label for="name">Gruppnamn</label>
                        <input type="text" id="name" placeholder="Skriv namnet på gruppen" class="form-input" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="genre">Genre</label>
                            <select id="genre" class="form-input" required>
                                <option value="" disabled selected>Välj en genre</option>
                                <!-- These four genres was what I found being used by the (seeded) database-->
                                <option value="0">Rock</option>
                                <option value="1">Blues</option>
                                <option value="2">Jazz</option>
                                <option value="3">Metal</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="establishedYear">Året då gruppen bildades</label>
                            <input type="number" id="establishedYear" placeholder="ÅÅÅÅ" class="form-input" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="group-image">Bild på gruppen</label>
                        <div class="file-input-wrapper">
                            <input type="text" id="group-image" placeholder="Ingen bild vald" class="form-input" readonly>
                            <button type="button" class="btn btn-edit">Välj bild</button>
                        </div>
                    </div>
                </section>

            <div class="content-wrapper">
                <div class="form-actions">
                    <a href="index.html" class="btn btn-cancel">Avbryt</a>
                    <button type="submit" class="btn btn-save">Nästa steg</button>
                </div>
            </div>
        </form>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="copyright">
                &copy; 2026 Evergreen Music. Fullständiga rättigheter förbehållna.
            </div>
            
            <div class="footer-links">
                <div class="footer-column">
                    <h4>Min utbildning</h4>
                    <ul>
                        <li><a href="https://teknikhogskolan.se/om-oss/studieorter/gavle/">Teknikhögskolan Gävle</a></li>
                        <li><a href="https://teknikhogskolan.omniway.se/">Omniway</a></li>
                    </ul>
                </div>
                <div class="footer-column">
                    <h4>Riktlinjer</h4>
                    <ul>
                        <li><a href="https://music.razor.public.seido.se/ListOfGroups">Lärarens inspiration</a></li>
                        <li><a href="https://music-api-public-80030692.azurewebsites.net/swagger/index.html">Swagger API dokumentation</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
